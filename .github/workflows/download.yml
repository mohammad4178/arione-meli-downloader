name: Download File

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: 'لینک مستقیم فایل'
        required: true
        type: string
      file_name:
        description: 'نام فایل خروجی (اختیاری)'
        required: false
        type: string
        default: ''
      split_enabled:
        description: 'تقسیم فایل‌های بزرگ (true/false)'
        required: false
        type: string
        default: 'true'

permissions:
  contents: write

jobs:
  download-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 📥 Checkout مخزن
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🧹 پاکسازی فایل‌های قدیمی (بیش از 2 روز)
        run: |
          echo "=== پاکسازی فایل‌های قدیمی‌تر از 2 روز ==="
          if [ -d "download-temp" ]; then
            # Find files older than 2 days
            OLD_FILES=$(find download-temp -type f -mtime +2 2>/dev/null || true)
            if [ -n "$OLD_FILES" ]; then
              echo "فایل‌های قدیمی پیدا شد:"
              echo "$OLD_FILES"
              find download-temp -type f -mtime +2 -delete 2>/dev/null || true
              # Remove empty directories
              find download-temp -type d -empty -delete 2>/dev/null || true
              echo "فایل‌های قدیمی حذف شدند."
            else
              echo "فایل قدیمی‌ای یافت نشد."
            fi
          else
            echo "پوشه download-temp وجود ندارد. ایجاد می‌شود."
          fi
          mkdir -p download-temp

      - name: 🔧 نصب aria2
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq aria2 zip

      - name: 📥 دانلود فایل
        run: |
          FILE_URL="${{ github.event.inputs.file_url }}"
          CUSTOM_NAME="${{ github.event.inputs.file_name }}"

          echo "=== شروع دانلود ==="
          echo "لینک: $FILE_URL"

          # Determine output filename
          if [ -n "$CUSTOM_NAME" ]; then
            OUTPUT_NAME="$CUSTOM_NAME"
          else
            # Extract filename from URL
            OUTPUT_NAME=$(basename "$FILE_URL" | sed 's/\?.*//' | sed 's/#.*//')
            # If empty or just /, use default
            if [ -z "$OUTPUT_NAME" ] || [ "$OUTPUT_NAME" = "/" ]; then
              OUTPUT_NAME="downloaded_file"
            fi
          fi

          echo "نام فایل خروجی: $OUTPUT_NAME"
          echo "OUTPUT_NAME=$OUTPUT_NAME" >> $GITHUB_ENV

          # Download with aria2c
          aria2c \
            --max-connection-per-server=16 \
            --split=16 \
            --min-split-size=1M \
            --max-tries=5 \
            --retry-wait=3 \
            --continue=true \
            --auto-file-renaming=false \
            --allow-overwrite=true \
            --console-log-level=notice \
            --summary-interval=10 \
            --dir="./download-temp" \
            --out="$OUTPUT_NAME" \
            "$FILE_URL"

          # Verify download
          if [ ! -f "download-temp/$OUTPUT_NAME" ]; then
            echo "❌ خطا: فایل دانلود نشد!"
            exit 1
          fi

          FILE_SIZE=$(stat -c%s "download-temp/$OUTPUT_NAME")
          echo "✅ دانلود کامل شد. حجم: $FILE_SIZE بایت"
          echo "FILE_SIZE=$FILE_SIZE" >> $GITHUB_ENV

      - name: ✂️ تقسیم و فشرده‌سازی فایل (در صورت نیاز)
        run: |
          SPLIT_ENABLED="${{ github.event.inputs.split_enabled }}"
          FILE_PATH="download-temp/${{ env.OUTPUT_NAME }}"
          FILE_SIZE=${{ env.FILE_SIZE }}
          THRESHOLD=$((90 * 1024 * 1024))  # 90MB

          echo "=== بررسی نیاز به تقسیم ==="
          echo "حجم فایل: $FILE_SIZE بایت"
          echo "آستانه: $THRESHOLD بایت"
          echo "تقسیم فعال: $SPLIT_ENABLED"

          if [ "$SPLIT_ENABLED" = "true" ] && [ "$FILE_SIZE" -gt "$THRESHOLD" ]; then
            echo "فایل بزرگتر از 90MB است. شروع تقسیم..."

            ORIGINAL_NAME="${{ env.OUTPUT_NAME }}"
            SPLIT_DIR="download-temp/split_temp"
            mkdir -p "$SPLIT_DIR"

            # Split file into 90MB chunks
            split -b 90M -d --additional-suffix=.part "$FILE_PATH" "$SPLIT_DIR/${ORIGINAL_NAME}."

            echo "قطعات ایجاد شده:"
            ls -lh "$SPLIT_DIR/"

            # Create ZIP containing all parts
            ZIP_NAME="${ORIGINAL_NAME}.split.zip"
            cd "$SPLIT_DIR"
            zip -0 "../$ZIP_NAME" *
            cd ../..

            echo "فایل ZIP ایجاد شد: $ZIP_NAME"
            ls -lh "download-temp/$ZIP_NAME"

            # Remove original file and split temp
            rm -f "$FILE_PATH"
            rm -rf "$SPLIT_DIR"

            echo "FINAL_FILE=$ZIP_NAME" >> $GITHUB_ENV
            echo "WAS_SPLIT=true" >> $GITHUB_ENV
          else
            echo "نیازی به تقسیم نیست."
            echo "FINAL_FILE=${{ env.OUTPUT_NAME }}" >> $GITHUB_ENV
            echo "WAS_SPLIT=false" >> $GITHUB_ENV
          fi

      - name: 📊 نمایش اطلاعات فایل نهایی
        run: |
          echo "=== فایل‌های موجود در download-temp ==="
          ls -lhR download-temp/
          echo ""
          echo "فایل نهایی: ${{ env.FINAL_FILE }}"
          echo "تقسیم شده: ${{ env.WAS_SPLIT }}"

      - name: 📤 آپلود به مخزن (Commit & Push)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Add all files in download-temp
          git add download-temp/ -f

          # Check if there are changes
          if git diff --staged --quiet; then
            echo "تغییری برای commit وجود ندارد."
          else
            TIMESTAMP=$(date '+%Y-%m-%d %H:%M:%S')
            git commit -m "📥 دانلود فایل: ${{ env.FINAL_FILE }} - $TIMESTAMP"

            # Push with retry
            for i in 1 2 3; do
              echo "تلاش $i برای push..."
              if git push origin main; then
                echo "✅ Push موفق بود!"
                break
              else
                echo "⚠️ Push ناموفق. تلاش مجدد..."
                git pull --rebase origin main
                sleep 5
              fi
            done
          fi

      - name: 🔗 نمایش لینک دانلود
        run: |
          REPO="${{ github.repository }}"
          FILE="${{ env.FINAL_FILE }}"

          echo "============================================"
          echo "✅ عملیات با موفقیت انجام شد!"
          echo "============================================"
          echo ""
          echo "📥 لینک دانلود مستقیم (Raw):"
          echo "https://raw.githubusercontent.com/${REPO}/main/download-temp/${FILE}"
          echo ""
          echo "📥 لینک CodeLoad:"
          echo "https://codeload.github.com/${REPO}/raw/main/download-temp/${FILE}"
          echo ""
          echo "📁 پوشه دانلودها:"
          echo "https://github.com/${REPO}/tree/main/download-temp"
          echo "============================================"
